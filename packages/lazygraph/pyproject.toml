[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "benchcraft-graph"
version = "0.1.0"
description = "Benchcraft Graph: a concrete Tier-2 sparse graph tensor adapter (PyG COO <-> SciPy CSR/CSC bridge) plus a minimal GCN forward pass built on it."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Benchcraft" }]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3 :: Only",
]

# Per architecture doc Part 3 ("Module 4: LazyGraph") and §2.7: unlike
# AutoML's ONNX extra or LazyClean's PyTorch-free constraint, LazyGraph's
# one signature capability implemented in this scaffold-depth pass --  a
# concrete Tier-2 sparse tensor adapter plus a GCN forward pass -- cannot
# exist at all without torch/torch_geometric. They are therefore core
# dependencies here, not optional extras, per the architecture doc's
# explicit acknowledgment that PyTorch-heavy modules have their own
# self-contained (and here, unavoidable) dependency universe.
#
# Licensing (§2.2/§2.4 of Module 4's description, CLAUDE.md licensing
# policy): METIS (restrictive academic license) and its optional carrier
# `torch-sparse`, and CHOLMOD/SuiteSparse (GPLv2+), are never installed by
# this package or referenced anywhere in its code. The CPU sparse-format
# bridge (COO <-> CSR/CSC) uses only `scipy.sparse` + `numpy`. Graclus-based
# coarsening/sampling via `torch-cluster` is out of scope for this narrow
# pass (see README "Deferred").
#
# lazycore is a local sibling package (packages/lazycore), not yet a package
# published to PyPI -- hatchling/pip do not have a portable, idiomatic way
# to express a relative-path dependency in pyproject.toml metadata (unlike
# e.g. Poetry's `path = "../lazycore"` extra), so this does not pin a
# version. It is still declared here by its PyPI distribution name,
# benchcraft-core (matching packages/automl's convention) so that a
# clean install fails fast with a clear "could not find benchcraft-core"
# error instead of succeeding and then failing at import time inside
# `lazycore.data`. It must be installed first: `pip install -e
# packages/lazycore` before installing this package. See README
# "Installation".
dependencies = [
    "benchcraft-core",
    "numpy>=1.24",
    "scipy>=1.11",
    "torch>=2.2",
    "torch_geometric>=2.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/benchcraft_lazygraph"]
