[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "benchcraft-security"
version = "0.1.0"
description = "Benchcraft LazyRed: a BaseSecurityAdapter pattern for local-target red-teaming -- a real prompt-injection probe/detector loop run through the shared lazycore sandbox executor, with OWASP-mapped OTel findings and a small pass/fail leaderboard."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Benchcraft" }]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3 :: Only",
]

# Per architecture doc Part 3 ("Module 7: LazyRed"): this module is
# deliberately stdlib + lazycore only at this scaffold depth. It does NOT
# depend on garak/deepteam/pyrit/promptfoo -- those are real future
# integration work, not pulled in here (see README "Scope"). This also
# means LazyRed's dependency universe stays lightweight, unlike the
# Node-adjacent tooling implied by a real Promptfoo integration (§2.7).
#
# lazycore is a local sibling package (packages/lazycore) and is not listed
# here as a formal path dependency -- hatchling/pip do not have a portable,
# idiomatic way to express a relative-path dependency in pyproject.toml
# metadata. Matching the convention established in packages/lazytune and
# packages/automl: install it first -- `pip install -e packages/lazycore`
# -- before installing this package. See README "Installation".
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/benchcraft_lazyred"]
