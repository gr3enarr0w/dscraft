[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "benchcraft-forecast"
version = "0.1.0"
description = "Benchcraft Forecast: classical statistical forecasting (AutoARIMA/AutoETS via Nixtla statsforecast) over a Tier-1 Arrow-backed input pipeline, with a basic backtest/evaluation report."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Benchcraft" }]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3 :: Only",
]

# Per architecture doc Part 3 ("Module 3: LazyForecast"), this scaffold-depth
# pass implements only the classical statistical branch (AutoARIMA/AutoETS
# via Nixtla's statsforecast). statsforecast is Apache-2.0 and runs fully
# local/CPU -- no network calls, no licensing isolation needed. It is a core
# (non-optional) dependency per the task spec, along with numpy/pandas.
# statsforecast pulls in its own numba/scipy dependency tree; that is
# expected and accepted, not accidental bloat.
#
# polars is intentionally NOT a hard dependency here -- Polars input is
# supported (see forecast.py's `_prepare_frame`), but polars itself is only
# imported lazily, at the point a caller actually passes a polars.DataFrame,
# mirroring the lazy-import pattern already used in lazycore.data.
#
# lazycore is a local sibling package (packages/lazycore), not published to
# PyPI. hatchling/pip do not have a portable, idiomatic way to express a
# relative-path dependency in pyproject.toml metadata (unlike e.g. Poetry's
# `path = "../lazycore"` extra), so it is declared here by its PyPI
# distribution name, benchcraft-core, as a bare, unpinned requirement --
# pinning a version would be misleading since it doesn't resolve from PyPI
# at all. This is a real runtime dependency (forecast.py imports
# lazycore.data at module level); declaring it means an isolated
# `pip install packages/lazyforecast` fails fast with a clear "could not
# find benchcraft-core" resolution error instead of a silent
# import-time crash. Matching the convention already established in
# packages/automl and packages/lazyclean: install it first -- `pip install
# -e packages/lazycore` -- before installing this package. See README
# "Installation".
dependencies = [
    "benchcraft-core",
    "numpy>=1.24",
    "pandas>=2.0",
    "statsforecast>=1.7",
]

[project.optional-dependencies]
# statsmodels is dev/test-only: it supplies bundled, real, offline
# time-series datasets (co2, nile) used to validate forecast()/backtest()
# against real data in tests/test_real_dataset_validation.py and the
# examples/forecast_example.py second section. It is NOT used by
# benchcraft_lazyforecast's actual forecasting logic (that's statsforecast,
# a core dependency above) -- so it belongs in `dev`, not `dependencies`.
dev = [
    "pytest>=7.0",
    "statsmodels>=0.14",
]

[tool.hatch.build.targets.wheel]
packages = ["src/benchcraft_lazyforecast"]
