[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "benchcraft-agent"
version = "0.1.0"
description = "Benchcraft Agent: a bring-your-own-agent AgentAdapter pattern -- a rule-based reference agent executes file-manipulation tool-use tasks through the shared lazycore sandbox executor, scored for success/latency and reported via OTel GenAI telemetry."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Benchcraft" }]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3 :: Only",
]

# Per architecture doc Part 3 ("Module 8: LazyAgent"): this module is
# deliberately stdlib + lazycore only at this scaffold depth. It does NOT
# depend on smolagents/langgraph/autogen/camel -- those are real framework
# integrations for future work, not pulled in here (see README "Scope").
# "Bring your own agent" means the core loop accepts any caller-supplied
# Python callable matching AgentAdapter's documented signature; it is not a
# registry/router of supported frameworks (§2.8).
#
# lazycore is a local sibling package (packages/lazycore). It is declared
# here by its PyPI distribution name, benchcraft-core -- matching the
# convention established in packages/automl, packages/lazyforecast,
# packages/lazygraph, and packages/lazytune -- so a normal `pip install`
# resolves it instead of silently succeeding and failing at import time. It
# still must be installed first (or made resolvable, e.g. via an editable
# install/local index) since it is not published to PyPI -- see README
# "Installation".
dependencies = [
    "benchcraft-core",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/benchcraft_lazyagent"]
