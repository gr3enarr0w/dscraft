          #   if not base_url or not api_key or not model:
          #       fail_closed(
          #           "OLLAMA_BASE_URL, OLLAMA_API_KEY, or OLLAMA_MODEL is not "
          #           "configured for this repo, so no design-alignment check "
          #           "could be performed."
          #       )
          #
          #   try:
          #       with open("CLAUDE.md", "r") as f:
          #           claude_md = f.read()
          #   except OSError as exc:
          #       fail_closed(f"Could not read CLAUDE.md at the PR head commit: {exc}")
          #
          #   try:
          #       with open("/tmp/pr.diff", "r") as f:
          #           pr_diff = f.read()
          #   except OSError as exc:
          #       fail_closed(f"Could not read the PR diff: {exc}")
          #
          #   system_prompt = (
          #       "You are reviewing a pull request's diff against a project's "
          #       "locked, non-negotiable architecture constraints. The full "
          #       "contents of the project's CLAUDE.md governance document are "
          #       "below -- treat everything in it, especially the sections "
          #       "'Core scope constraints', 'Shared architecture (LazyCore)', "
          #       "'Licensing policy (LazyIsolate)', and 'Working as a "
          #       "library, not a pile of scripts', as settled and "
          #       "non-negotiable.\n\n"
          #       "=== CLAUDE.md ===\n"
          #       f"{claude_md}\n"
          #       "=== end CLAUDE.md ===\n\n"
