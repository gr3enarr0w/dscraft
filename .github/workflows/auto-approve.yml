name: Auto-approve

# Gates auto-merge of PRs authored by a small allowlist of trusted humans
# (ceverson70, gr3enarr0w) behind an LLM design-alignment check, without
# using a GitHub App or posting any PR review.
#
# This job's own name, "design-alignment", is a required status check on
# main's branch protection. That means the job's pass/fail outcome *is*
# the check GitHub blocks merging on -- there is no separate polling step
# that reads other checks' state and no PR-review-based approval concept
# here at all. Concretely:
#   - If the diff is judged aligned with CLAUDE.md, this job succeeds
#     (green "design-alignment" check) and calls `gh pr merge --auto`,
#     which enables GitHub's own native auto-merge. GitHub then completes
#     the merge itself once every required context -- CodeRabbit, the
#     full test matrix, and this now-green design-alignment check -- is
#     green, using GitHub's own correct built-in logic. This workflow
#     does not need to poll or wait for that to happen.
#   - If the diff is judged not aligned, or the alignment pipeline itself
#     errors out for any reason (missing secret, bad response shape,
#     network failure, etc. -- fail-closed throughout), this job posts an
#     explanatory PR comment and then exits non-zero. That failing
#     required check blocks the default merge path.
#
# An older version of this workflow tried to have a dedicated GitHub App
# post a PR *review* so it would count as branch protection's required
# "different-account approval." That does not work on a personal-account
# repo like this one: GitHub never treats an installed App as a
# "collaborator with write permission" for required-review-counting
# purposes there, so the App's review posted successfully but never
# satisfied required_approving_review_count. Rather than route around
# that with a second personal account, this repo's branch protection was
# changed instead: required_approving_review_count is now 0 (this check,
# plus CodeRabbit, plus the test suite, ARE the review layer for this
# solo-maintainer repo) and enforce_admins is false, so the repo's actual
# admin (gr3enarr0w) can still manually override and merge via
# `gh pr merge --admin` if they disagree with this job's verdict. Both of
# those branch-protection changes are already live; this workflow does
# not configure them.
#
# Uses pull_request (not pull_request_target) throughout: both allowlisted
# authors push same-repo branches, never forks, so there is no
# secret-exposure motivation for the target-branch-context variant here.
#
# Required secrets (Settings > Secrets and variables > Actions > Secrets),
# already configured on this repo:
#   - OLLAMA_API_KEY    API key for an Ollama Cloud account.
#   - OLLAMA_BASE_URL   Base URL for the Ollama Cloud OpenAI-compatible
#                       endpoint (this workflow POSTs to
#                       "$OLLAMA_BASE_URL/v1/chat/completions").
# Required repo variable (Settings > Secrets and variables > Actions >
# Variables), already configured on this repo:
#   - OLLAMA_MODEL      Model name to request, e.g. "gpt-oss:120b" or
#                       whatever is provisioned on the Ollama Cloud
#                       account -- deliberately not hardcoded here since
#                       that choice is environment-specific and will
#                       change over time.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  design-alignment:
    name: design-alignment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Trusted-author allowlist gate. Anything else: this job does not run
    # at all -- no check, no comment, nothing observable. (This is
    # unrelated to the removed review-approval concept above -- it's
    # purely about who gets this automated gate applied to their PRs.)
    if: contains(fromJSON('["ceverson70", "gr3enarr0w"]'), github.event.pull_request.user.login)
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr diff "${{ github.event.pull_request.number }}" > /tmp/pr.diff

      - name: Design-alignment check via Ollama Cloud
        id: alignment
        env:
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
        run: |
          set -uo pipefail

          # The actual review script is written out here as a single
          # base64 blob (decoded to /tmp/alignment_check.py below) rather
          # than as an inline heredoc. A multi-line heredoc indented to
          # match this file's surrounding bash style breaks two different
          # ways at once: YAML's block-scalar parser requires every
          # physical line of a `run: |` block to carry at least the
          # block's own indentation, while Python requires its top-level
          # statements to carry *no* leading indentation at all -- there
          # is no single indentation level that satisfies both. A single
          # unbroken base64 line sidesteps both constraints entirely. The
