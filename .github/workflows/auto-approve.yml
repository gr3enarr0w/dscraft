          echo "" | base64 -d > /tmp/alignment_check.py

          python3 /tmp/alignment_check.py

      - name: Merge if aligned
        if: steps.alignment.outputs.aligned == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --delete-branch

      - name: Comment and fail if not aligned
        if: steps.alignment.outputs.aligned != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Design-alignment check: ${{ steps.alignment.outputs.reasoning }}. This PR was NOT auto-merged. If you disagree with this verdict, override manually: \`gh pr merge <PR> --admin --squash --delete-branch\` (or the equivalent through the GitHub UI's admin merge option)."
          exit 1
