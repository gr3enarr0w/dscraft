          #       "a new shared LLM-router/multi-provider abstraction added "
          #       "when CLAUDE.md explicitly forbids one; a GPL/AGPL "
          #       "dependency added without the documented isolation pattern "
          #       "(subprocess/IPC for local runtime use, full replacement if "
          #       "it would be the network-facing service); a new "
          #       "subpackage-to-subpackage import introduced when the "
          #       "module dependency graph says subpackages stay "
          #       "independent; non-MIT code added to platform code; a new "
          #       "standalone script added outside the installable package "
          #       "structure instead of behind a real function/class API; "
          #       "duplicated logic next to an existing implementation of "
          #       "the same capability instead of extending it in place.\n\n"
          #       "Respond with exactly one JSON object and nothing else, no "
          #       "markdown code fences, no preamble, no trailing text: "
          #       '{"aligned": true or false, "reasoning": "1-3 sentences"}'
          #   )
          #
          #   user_prompt = "Here is the PR diff to review:\n\n" f"{pr_diff}"
          #
          #   payload = json.dumps(
          #       {
          #           "model": model,
          #           "messages": [
          #               {"role": "system", "content": system_prompt},
          #               {"role": "user", "content": user_prompt},
          #           ],
          #           "stream": False,
          #       }
          #   ).encode("utf-8")
          #
          #   req = urllib.request.Request(
          #       f"{base_url}/v1/chat/completions",
          #       data=payload,
          #       method="POST",
          #       headers={
          #           "Authorization": f"Bearer {api_key}",
          #           "Content-Type": "application/json",
          #       },
          #   )
          #
          #   try:
          #       with urllib.request.urlopen(req, timeout=120) as resp:
          #           body = json.loads(resp.read().decode("utf-8"))
          #   except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError, OSError) as exc:
          #       fail_closed(f"The Ollama Cloud request failed or timed out: {exc}")
          #   except json.JSONDecodeError as exc:
          #       fail_closed(f"The Ollama Cloud response was not valid JSON: {exc}")
          #
          #   try:
          #       content = body["choices"][0]["message"]["content"]
          #   except (KeyError, IndexError, TypeError) as exc:
          #       fail_closed(f"The Ollama Cloud response did not have the expected shape: {exc}")
          #
          #   try:
          #       verdict = json.loads(content)
          #   except json.JSONDecodeError as exc:
          #       fail_closed(f"The model's response body was not parseable JSON: {exc}")
          #
          #   if not isinstance(verdict, dict) or verdict.get("aligned") is not True:
          #       reasoning = verdict.get("reasoning") if isinstance(verdict, dict) else None
          #       fail_closed(
          #           reasoning
          #           or "The model judged the diff not aligned with CLAUDE.md, "
          #           "or returned an unexpected/ambiguous verdict."
          #       )
          #
          #   reasoning = verdict.get("reasoning", "No reasoning provided.")
          #
          #   with open(os.environ["GITHUB_OUTPUT"], "a") as f:
          #       f.write("aligned=true\n")
          #       f.write("reasoning<<EOF\n")
          #       f.write(str(reasoning) + "\n")
          #       f.write("EOF\n")
          #
          #   print(f"ALIGNED: {reasoning}")

          echo "" | base64 -d > /tmp/alignment_check.py

          python3 /tmp/alignment_check.py

      - name: Approve PR
        if: steps.poll-checks.outputs.checks_green == 'true' && steps.alignment.outputs.aligned == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "${{ steps.alignment.outputs.reasoning }}"

      - name: Update PR branch with main (best-effort)
        id: update-branch
        if: steps.poll-checks.outputs.checks_green == 'true' && steps.alignment.outputs.aligned == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail

          # Branch protection's `strict` mode (if enabled) requires the PR
          # branch be up to date with main before merging. This call can
          # legitimately no-op/error if it's already up to date -- that's
          # fine, don't fail the job over it.
          http_status="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/update-branch" -X PUT \
            --silent -o /tmp/update-branch.json -w '%{http_code}' 2>/tmp/update-branch.err || true)"

          echo "update-branch HTTP status: ${http_status:-unknown}"

          if [[ "$http_status" == "202" ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            cat /tmp/update-branch.err 2>/dev/null || true
          fi

      - name: Re-poll checks after branch update
        if: steps.poll-checks.outputs.checks_green == 'true' && steps.alignment.outputs.aligned == 'true' && steps.update-branch.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail

          # The update-branch call above creates a new merge commit on the
          # PR branch, so re-confirm required checks re-settle to green on
          # that new commit before merging. Shorter timeout than the
          # initial poll -- this is just re-confirming, not starting from
          # scratch.
          required_contexts="$(gh api "repos/${REPO}/branches/main/protection" --jq '.required_status_checks.contexts[]')"

          # Resolve the new head sha after the update-branch merge commit.
          new_head_sha="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.sha')"

          deadline=$(( $(date +%s) + 10*60 ))

          while true; do
            check_runs_json="$(gh api --paginate "repos/${REPO}/commits/${new_head_sha}/check-runs" --jq '.check_runs')"

            all_green=true
            failed=false

            while IFS= read -r context; do
              [[ -z "$context" ]] && continue

              conclusion="$(echo "$check_runs_json" | python3 -c "import json, sys; runs = json.load(sys.stdin); name = sys.argv[1]; matches = [r for r in runs if r.get('name') == name]; matches.sort(key=lambda r: r.get('started_at') or ''); print((matches[-1].get('conclusion') or '') if matches else '')" "$context")"

              if [[ "$conclusion" == "failure" || "$conclusion" == "cancelled" || "$conclusion" == "timed_out" || "$conclusion" == "action_required" ]]; then
                echo "Required check '${context}' concluded '${conclusion}' after branch update -- not proceeding."
                failed=true
                break
              fi

              if [[ "$conclusion" != "success" ]]; then
                all_green=false
              fi
            done <<< "$required_contexts"

            if $failed; then
              echo "::error::Required checks failed after branch update; not merging."
              exit 1
            fi

            if $all_green; then
              echo "All required checks re-confirmed green after branch update."
              exit 0
            fi

            if (( $(date +%s) >= deadline )); then
              echo "::error::Timed out re-confirming checks after branch update; not merging."
              exit 1
            fi

            sleep 30
          done

      - name: Squash-merge PR
        if: steps.poll-checks.outputs.checks_green == 'true' && steps.alignment.outputs.aligned == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch

      - name: Comment explaining why this PR was not auto-merged
        if: steps.poll-checks.outputs.checks_green == 'true' && steps.alignment.outputs.aligned != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Auto-approve bot: this PR was not auto-merged -- ${{ steps.alignment.outputs.reasoning }}. Checks are green; a human should review the design-alignment concern above."
