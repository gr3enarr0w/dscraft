name: Auto-approve

# Auto-approves and squash-merges PRs authored by a small allowlist of
# trusted humans (ceverson70, gr3enarr0w) once (a) every required
# branch-protection status check on the PR's head commit is green, and (b)
# an LLM call to an Ollama Cloud (OpenAI-compatible) endpoint judges the
# PR's diff as aligned with this repo's locked design constraints in
# CLAUDE.md. If either condition fails, no merge action is taken: an
# unlisted author means the workflow does nothing at all, and a
# checks-green-but-misaligned PR gets a comment explaining the concern and
# is left for a human to review and merge manually.
#
# This is a belt-and-suspenders layer on top of required status checks and
# CodeRabbit review, not a replacement for either -- it only ever acts on
# PRs from the two people already trusted to push directly to this repo,
# and only after independently re-confirming checks are green.
#
# Uses pull_request (not pull_request_target) throughout: both allowlisted
# authors push same-repo branches, never forks, so there is no
# secret-exposure motivation for the target-branch-context variant here.
#
# This workflow depends on infrastructure that does not exist yet and will
# not fire correctly until a human provisions it:
#   Repo secrets (Settings > Secrets and variables > Actions > Secrets):
#     - AUTO_APPROVE_APP_ID           GitHub App ID for a dedicated,
#                                     narrowly-scoped "auto-approve bot"
#                                     App installed on this repo. Needed
#                                     because the default GITHUB_TOKEN
#                                     cannot approve a PR opened by the
#                                     same workflow's actor in all cases,
#                                     and cannot trigger downstream
#                                     required-check runs on the resulting
#                                     merge commit the way a distinct App
#                                     identity can. The App must also be
#                                     granted "Administration: Read"
#                                     repository permission: reading
#                                     branch protection's required status
#                                     check list (GET
#                                     /repos/{owner}/{repo}/branches/{branch}/protection)
#                                     requires that permission per GitHub's
#                                     REST API docs, and it is *not*
#                                     grantable to GITHUB_TOKEN -- there is
#                                     no "administration" key in a
#                                     workflow's `permissions:` block (see
#                                     the full enumerated list in "Workflow
#                                     syntax for GitHub Actions"). That is
#                                     why the two steps below that read
#                                     branch protection use the App
#                                     installation token instead of
#                                     `github.token`, and why that token is
#                                     minted before those steps rather than
#                                     only just before the approve/merge
#                                     steps.
#     - AUTO_APPROVE_APP_PRIVATE_KEY  Private key (PEM) for that App.
#     - OLLAMA_API_KEY                API key for an Ollama Cloud account.
#     - OLLAMA_BASE_URL               Base URL for the Ollama Cloud
#                                     OpenAI-compatible endpoint (the
#                                     workflow POSTs to
#                                     "$OLLAMA_BASE_URL/v1/chat/completions").
#   Repo variables (Settings > Secrets and variables > Actions > Variables):
#     - OLLAMA_MODEL                  Model name to request, e.g.
#                                     "gpt-oss:120b" or whatever the human
#                                     provisions on their Ollama Cloud
#                                     account -- deliberately not
#                                     hardcoded here since that choice is
#                                     environment-specific and will change
#                                     over time.
# Until all five of the above exist, this workflow's design-alignment step
# will simply fail its HTTP call and the job will fail closed (comment
# posted, no merge) -- which is the expected, safe behavior in the
# meantime, not a bug.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

# NOTE: branch protection's required-status-check list can only be read by
# a caller with repository "Administration: Read" access (per GitHub's
# REST API docs for "Get branch protection"). "administration" is not a
# valid key in this `permissions:` block -- the full set of scopes
# GITHUB_TOKEN can ever hold is enumerated in GitHub's "Workflow syntax
# for GitHub Actions" docs, and administration is not among them, by
# design (it is deliberately excluded from the ephemeral Actions token).
# So this block intentionally does NOT list `administration: read`; it
# would either be rejected as an unrecognized key or silently do nothing.
# The steps that need to read branch protection use the GitHub App
# installation token (minted early in the job) instead of github.token,
# since GitHub Apps -- unlike GITHUB_TOKEN -- can be granted
# Administration permission.
permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-approve:
    name: auto-approve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Trusted-author allowlist gate. Anything else: this job does not run
    # at all -- no approval, no comment, nothing observable.
    if: contains(fromJSON('["ceverson70", "gr3enarr0w"]'), github.event.pull_request.user.login)
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      # Minted here, before the first branch-protection read, rather than
      # just before the approve/merge steps: reading branch protection's
      # required-status-check list requires "Administration: Read", which
      # only a GitHub App/PAT can hold -- GITHUB_TOKEN cannot, so both
      # "Poll required status checks to green" and "Re-poll checks after
      # branch update" below need this token too, not just github.token.
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_APP_PRIVATE_KEY }}

      - name: Poll required status checks to green
        id: poll-checks
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail

          # Read the actual required contexts live, every run -- never
          # hardcode the "test (<subpackage>)" job-name list, since it can
          # change as subpackages are added/removed from the test matrix.
          required_contexts="$(gh api "repos/${REPO}/branches/main/protection" --jq '.required_status_checks.contexts[]')"

          if [[ -z "$required_contexts" ]]; then
            echo "::error::Could not read required_status_checks.contexts from branch protection; refusing to proceed."
            echo "checks_green=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Required contexts:"
          echo "$required_contexts"

          deadline=$(( $(date +%s) + 20*60 ))

          while true; do
            # Paginate: ~12 required checks can exceed a single page's
            # default page size.
            check_runs_json="$(gh api --paginate "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq '.check_runs')"

            all_green=true
            failed=false

            while IFS= read -r context; do
              [[ -z "$context" ]] && continue

              # Conclusion of the most recently-started run for this
              # context name. Single-line python3 -c deliberately -- no
              # embedded newlines, so this is immune to both YAML
              # block-scalar indentation rules and Python's own
              # top-level-indentation rules, neither of which tolerate a
              # heredoc/multi-line string indented to match this file's
              # surrounding bash style.
              conclusion="$(echo "$check_runs_json" | python3 -c "import json, sys; runs = json.load(sys.stdin); name = sys.argv[1]; matches = [r for r in runs if r.get('name') == name]; matches.sort(key=lambda r: r.get('started_at') or ''); print((matches[-1].get('conclusion') or '') if matches else '')" "$context")"

              if [[ "$conclusion" == "failure" || "$conclusion" == "cancelled" || "$conclusion" == "timed_out" || "$conclusion" == "action_required" ]]; then
                echo "Required check '${context}' concluded '${conclusion}' -- not proceeding."
                failed=true
                break
              fi

              if [[ "$conclusion" != "success" ]]; then
                all_green=false
              fi
            done <<< "$required_contexts"

            if $failed; then
              echo "checks_green=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if $all_green; then
              echo "All required checks are green."
              echo "checks_green=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if (( $(date +%s) >= deadline )); then
              echo "Timed out after 20 minutes waiting for required checks; not proceeding."
              echo "checks_green=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 30
          done

      - name: Fetch PR diff
        if: steps.poll-checks.outputs.checks_green == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr diff "${{ github.event.pull_request.number }}" > /tmp/pr.diff

      - name: Design-alignment check via Ollama Cloud
        id: alignment
        if: steps.poll-checks.outputs.checks_green == 'true'
        env:
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
        run: |
          set -uo pipefail

          # The actual review script is written out here as a single
          # base64 blob (decoded to /tmp/alignment_check.py below) rather
          # than as an inline heredoc. A multi-line heredoc indented to
          # match this file's surrounding bash style breaks two different
          # ways at once: YAML's block-scalar parser requires every
          # physical line of a `run: |` block to carry at least the
          # block's own indentation, while Python requires its top-level
          # statements to carry *no* leading indentation at all -- there
          # is no single indentation level that satisfies both. A single
          # unbroken base64 line sidesteps both constraints entirely. The
          # decoded script's plaintext source is the canonical version of
          # this logic; treat this blob as generated from it, not as
          # independently-maintained.
          #
          # Plaintext of the decoded script:
          #
          #   import json
          #   import os
          #   import sys
          #   import urllib.error
          #   import urllib.request
          #
          #   def fail_closed(reasoning):
          #       with open(os.environ["GITHUB_OUTPUT"], "a") as f:
          #           f.write("aligned=false\n")
          #           f.write("reasoning<<EOF\n")
          #           f.write(reasoning + "\n")
          #           f.write("EOF\n")
          #       print(f"NOT ALIGNED (fail-closed): {reasoning}")
          #       sys.exit(0)
